<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="refresh" content="1; url=https://hyu-aisw.onrender.com" />
    <title>NutriCycle 웹 서비스 열기</title>

        background: #f3f7f4;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
      }

      main {
        width: min(520px, calc(100% - 40px));
        padding: 32px;
        border: 1px solid #d8e2db;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 12px 32px rgb(29 61 43 / 10%);

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        letter-spacing: 0;
      }

      p {
        margin: 0 0 22px;
        color: #526159;
        line-height: 1.65;
      }

      a {
        display: inline-block;
        padding: 12px 18px;
        border-radius: 6px;
        color: #ffffff;
        background: #347a52;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>NutriCycle</h1>
      <p>배포된 웹 서비스로 이동합니다. 자동으로 이동하지 않으면 아래 버튼을 눌러 주세요.</p>
